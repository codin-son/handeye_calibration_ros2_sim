services:
  handeye_sim:
    build: .
    image: handeye_sim:humble
    container_name: handeye_sim
    # Host network + IPC for DDS discovery and shared memory transport
    network_mode: host
    ipc: host
    # Host's /etc/hosts lacks a "127.0.0.1 localhost" entry; the container
    # inherits it under host networking and Gazebo needs localhost to resolve
    extra_hosts:
      - "localhost:127.0.0.1"
    runtime: nvidia
    gpus: all
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      # "all" includes graphics — required for OpenGL/GLX, default is compute-only
      - NVIDIA_DRIVER_CAPABILITIES=all
      # Uncomment on hybrid (Optimus) laptops if GL still falls back to Mesa:
      # - __NV_PRIME_RENDER_OFFLOAD=1
      # - __GLX_VENDOR_LIBRARY_NAME=nvidia
    # Also pass the iGPU so Mesa works when the X server runs on Intel
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Live-edit the package and persist samples/results on the host
      # (image was built with --symlink-install)
      - ./handeye_sim:/handeye_ws/src/handeye_sim:rw
    stdin_open: true
    tty: true
    command: bash
